<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

video.bg {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container {
  width:90%;
  max-width:900px;
  text-align:center;
}

h1 {
  margin-bottom:30px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #0ff;
}

.icon {
  font-size:40px;
  margin-bottom:10px;
}

.footer {
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
  color:#0ff;
  font-size:14px;
}
</style>
</head>

<body>

<!-- 🎬 الفيديو -->
<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="container">
  <h1>Project X</h1>

  <div class="grid">
    <div class="card" onclick="go('index.html')">
      <div class="icon">💻</div>
      <h3>CCNA R&S</h3>
    </div>
  </div>
</div>


<div class="footer">
  ⚡ Powered by xsaif <br>
  👁 Visitors: <span id="visits">0</span>
</div>

<script>

function go(page){
  window.location.href = page;
}


let visits = localStorage.getItem("visits");

if(!visits){
  visits = 1;
}else{
  visits = Number(visits) + 1;
}

localStorage.setItem("visits", visits);
document.getElementById("visits").innerText = visits;
</script>

</body>
</html>
