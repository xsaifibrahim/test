<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project X</title>


<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.footer {text-align:center;padding:10px;font-size:16px;color:#0ff;text-shadow:0 0 5px #0ff,0 0 10px #0ff;}

.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

h1 {
  text-align: center;
  margin-top: 10px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}


label {
  display:block;
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
  transition:0.3s;
}

label:hover {
  background: rgba(0,255,255,0.1);
}


input[type="radio"] {
  display:none;
}


label span::before {
  content:"";
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid #aaa;
  border-radius:50%;
  margin-right:10px;
  vertical-align:middle;
  transition:0.3s;
}


input[type="radio"]:checked + span {
  color:#0ff;
  font-weight:bold;
}


input[type="radio"]:checked + span::before {
  background:#0ff;
  border-color:#0ff;
  box-shadow:0 0 10px #0ff, 0 0 20px #0ff;
}


input[type="radio"]:checked + span {
  text-shadow:0 0 5px #0ff;
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="">
</audio>
  <!-- https://j.top4top.io/m_3748lc2rv1.mp3 -->

<div class="container">
<h1>s/w engineering</h1>
<h2>MCQs</h2>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="tf.html">
<<button type="button">⬅ True Or False</button>-
</a>
<div class="footer">⚡ Powered by xsaif</div>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
["Software is defined as ___________","set of programs, documentation & configuration of data","set of programs","documentation and configuration of data","None of the mentioned"],
["What is Software Engineering?","Designing a software","Testing a software","Application of engineering principles to the design a software","None of the above"],
["Who is the father of Software Engineering?","Margaret Hamilton","Watts S. Humphrey","Alan Turing","Boris Beizer"],
["What are the features of Software Code?","Simplicity","Accessibility","Modularity","All of the above"],
["____________ is a software development activity that is not a part of software processes.","Validation","Specification","Development","Dependence"],
["Define Agile scrum methodology.","project management that emphasizes incremental progress","project management that emphasizes decremental progress","project management that emphasizes neutral progress","project management that emphasizes no progress"],
["CASE stands for","Computer-Aided Software Engineering","Control Aided Science and Engineering","Cost Aided System Experiments","None of the mentioned"],
["________ is defined as the process of generating analysis and designing documents?","Re-engineering","Reverse engineering","Software re-engineering","Science and engineering"],
["The activity that distributes estimated effort across the planned project duration by allocating the effort to specific software developing tasks is ____________","Project scheduling","Detailed schedule","Macroscopic schedule","None of the mentioned"],
["What is a Functional Requirement?","specifies the tasks the program must complete","specifies the tasks the program should not complete","specifies the tasks the program must not work","All of the mentioned"],

["Choose the correct option in terms of Issues related to professional responsibility","Confidentiality","Intellectual property rights","Both Confidentiality & Intellectual property rights","Managing Client Relationships"],
["Software engineers should not use their technical skills to misuse other people’s computers. Here the term misuse refers to:","Unauthorized access to computer material","Unauthorized modification of computer material","Dissemination of viruses or other malware","All of the mentioned"],
["Explain what is meant by PRODUCT with reference to one of the eight principles as per the ACM/IEEE Code of Ethics ?","The product should be easy to use","Software engineers shall ensure that their products and related modifications meet the highest professional standards possible","Software engineers shall ensure that their products and related modifications satisfy the client","It means that the product designed /created should be easily available"],
["Identify an ethical dilemma from the situations mentioned below:","Your employer releases a safety-critical system without finishing the testing of the system","Refusing to undertake a project","Agreement in principle with the policies of senior management","All of the mentioned"],
["Identify the correct statement: Software engineers shall","act in a manner that is in the best interests of his expertise and favour.","act consistently with the public interest.","ensure that their products only meet the SRS.","all of the mentioned"],
["Select the incorrect statement: Software engineers should","not knowingly accept work that is outside your competence.","not use your technical skills to misuse other people’s computers.","be dependent on their colleagues.","maintain integrity and independence in their professional judgment."],
["Efficiency in a software product does not include ________","responsiveness","licensing","memory utilization","processing time"],
["As per an IBM report, what is the reason for these statistics ?","Lack of adequate training in software engineering","Lack of software ethics and understanding","Management issues in the company","All of the mentioned"],
["The reason for software bugs and failures is due to","Software companies","Software Developers","Both Software companies and Developers","All of the mentioned"],
["Software deteriorates rather than wears out because","Software suffers from exposure to hostile environment.","Defect are more likely to arise after software has been used often.","Multiple change request introduce errors in component interactions.","Software spare parts become harder to order."]
];

const answers = [
"set of programs, documentation & configuration of data",
"Application of engineering principles to the design a software",
"Watts S. Humphrey",
"Modularity",
"Dependence",
"project management that emphasizes incremental progress",
"Computer-Aided Software Engineering",
"Reverse engineering",
"Project scheduling",
"specifies the tasks the program must complete",

"Both Confidentiality & Intellectual property rights",
"All of the mentioned",
"Software engineers shall ensure that their products and related modifications meet the highest professional standards possible",
"Your employer releases a safety-critical system without finishing the testing of the system",
"act consistently with the public interest.",
"be dependent on their colleagues.",
"licensing",
"Lack of adequate training in software engineering",
"Both Software companies and Developers",
"Multiple change request introduce errors in component interactions."
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;

["A","B","C","D"].forEach((l,j)=>{
html+=`
<label>
  <input type="radio" name="q${i+1}" value="${q[j+1]}">
  <span>${l}) ${q[j+1]}</span>
</label>
`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label => {
  let input = label.querySelector("input");

  if(input.value === correct){
    label.innerHTML += " ✅";
    label.style.color = "#22c55e";
  }
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music = document.getElementById("bgMusic");
let volume = document.getElementById("volume");

music.volume = volume.value; 
document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
