<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project X</title>


<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.footer {text-align:center;padding:10px;font-size:16px;color:#0ff;text-shadow:0 0 5px #0ff,0 0 10px #0ff;}


.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}
h1 {
  text-align: center;
  margin-top: 10px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="">
</audio>
  <!-- https://j.top4top.io/m_3748lc2rv1.mp3 -->

<div class="container">
<h1>CCNA R&S III</h1>
<h2>MCQs Packet Switching & Circuit Switching</h2>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="tf.html">
<button type="button">⬅ MCQs on VLAN</button>
</a>
<div class="footer">⚡ Powered by xsaif</div>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
["Packet switching divides data into:","Signals","Packets","Frames","Bits"],
["Circuit switching establishes:","Temporary connection","Permanent path before transmission","Packet route","Logical address"],
["Which is used in telephone networks?","Packet switching","Circuit switching","Frame relay","ATM"],
["Which switching method is used in the Internet?","Circuit switching","Packet switching","Message switching","Line switching"],
["Packet switching is:","Connection-oriented only","Connectionless or connection-oriented","Physical only","Manual"],
["Circuit switching requires:","No setup","Setup phase","Packet header","Routing table"],
["In packet switching, data is sent:","As a whole","In packets","In signals","In circuits"],
["Circuit switching has:","Dynamic path","Dedicated path","No path","Random path"],
["Packet switching improves:","Delay","Efficiency","Cost","Errors"],
["Which has lower latency after setup?","Packet switching","Circuit switching","Both same","None"],
["Packet switching uses:","Dedicated bandwidth","Shared bandwidth","No bandwidth","Fixed bandwidth"],
["Circuit switching wastes:","Time","Bandwidth","Energy","Data"],
["Each packet contains:","Only data","Header and data","Address only","Signal only"],
["In packet switching, packets may:","Follow same path","Follow different paths","Not move","Stay fixed"],
["Circuit switching has phases:","1","2","3","4"],
["Packet switching does NOT require:","Setup","Routing","Header","Address"],
["Delay in packet switching is:","Constant","Variable","Zero","Fixed"],
["Circuit switching delay is:","Variable","Constant","Zero","Random"],
["Packet switching is used in:","Telephone","Internet","Radio","Cable TV"],
["Circuit switching example:","Email","VoIP","Telephone call","Web browsing"],
["Packet switching allows:","Resource sharing","Dedicated path","Fixed delay","No routing"],
["Circuit switching requires:","Routing per packet","No routing","Fixed routing","Dynamic routing"],
["Packet switching is more:","Expensive","Efficient","Slow","Rigid"],
["Circuit switching is:","Flexible","Rigid","Dynamic","Adaptive"],
["Packet switching handles congestion by:","Ignoring","Dropping packets","Fixing circuit","Blocking users"],
["Packet switching is:","Less reliable","More reliable (with protocols)","No error control","Fixed"],
["Circuit switching bandwidth is:","Shared","Dedicated","Random","Dynamic"],
["Packet switching bandwidth is:","Dedicated","Shared","Fixed","Reserved"],
["Which is faster for continuous data?","Packet switching","Circuit switching","Both","None"],
["Which is better for burst data?","Packet switching","Circuit switching","Both","None"],
["Packet switching uses:","Store and forward","Direct transfer","Analog signals","Circuits"],
["Circuit switching uses:","Store and forward","Dedicated path","Packet routing","Buffers"],
["Packet switching reduces:","Flexibility","Efficiency","Cost","Speed"],
["Circuit switching increases:","Efficiency","Delay","Cost","Sharing"],
["Packet switching supports:","Multiple users","Single user","No user","Fixed user"],
["Circuit switching supports:","Multiple paths","Single dedicated path","No path","Random path"],
["Packet switching uses:","Headers","Circuits","Channels","Signals"],
["Circuit switching requires:","Packet header","Setup phase","Buffer","Routing table"],
["Packet switching delay depends on:","Traffic","Distance","Cable","Signal"],
["Circuit switching is best for:","Data bursts","Voice calls","Emails","Web browsing"]
];

const answers = [
"Packets",
"Permanent path before transmission",
"Circuit switching",
"Packet switching",
"Connectionless or connection-oriented",
"Setup phase",
"In packets",
"Dedicated path",
"Efficiency",
"Circuit switching",
"Shared bandwidth",
"Bandwidth",
"Header and data",
"Follow different paths",
"3",
"Setup",
"Variable",
"Constant",
"Internet",
"Telephone call",
"Resource sharing",
"No routing",
"Efficient",
"Rigid",
"Dropping packets",
"More reliable (with protocols)",
"Dedicated",
"Shared",
"Circuit switching",
"Packet switching",
"Store and forward",
"Dedicated path",
"Cost",
"Delay",
"Multiple users",
"Single dedicated path",
"Headers",
"Setup phase",
"Traffic",
"Voice calls"
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;
["A","B","C","D"].forEach((l,j)=>{
html+=`<label><input type="radio" name="q${i+1}" value="${q[j+1]}"> ${l}) ${q[j+1]}</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label => {
  let input = label.querySelector("input");

  if(input.value === correct){
    label.innerHTML += " ✅";
    label.style.color = "#22c55e";
  }
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music = document.getElementById("bgMusic");
let volume = document.getElementById("volume");

music.volume = volume.value; 
document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
