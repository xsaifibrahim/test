<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project X</title>


<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.footer {text-align:center;padding:10px;font-size:16px;color:#0ff;text-shadow:0 0 5px #0ff,0 0 10px #0ff;}

.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

h1 {
  text-align: center;
  margin-top: 10px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}


label {
  display:block;
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
  transition:0.3s;
}

label:hover {
  background: rgba(0,255,255,0.1);
}


input[type="radio"] {
  display:none;
}


label span::before {
  content:"";
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid #aaa;
  border-radius:50%;
  margin-right:10px;
  vertical-align:middle;
  transition:0.3s;
}


input[type="radio"]:checked + span {
  color:#0ff;
  font-weight:bold;
}


input[type="radio"]:checked + span::before {
  background:#0ff;
  border-color:#0ff;
  box-shadow:0 0 10px #0ff, 0 0 20px #0ff;
}


input[type="radio"]:checked + span {
  text-shadow:0 0 5px #0ff;
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="">
</audio>
  <!-- https://j.top4top.io/m_3748lc2rv1.mp3 -->

<div class="container">
<h1>CCNA SECUIRTY</h1>
<h2>MCQs</h2>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="tf.html">
  <button type="button">⬅ True Or False</button>
</a>
<div class="footer">⚡ Powered by xsaif</div>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
["What is the main objective of Network Security?","Increasing internet speed","Protecting systems and data from threats","Managing printers","Compressing files"],
["Which CIA Triad component ensures data secrecy?","Availability","Integrity","Confidentiality","Authentication"],
["Which attack intercepts communication between two parties?","DDoS","MITM","Phishing","Trojan"],
["Which process reduces unnecessary services on devices?","Routing","Hardening","NAT","Switching"],
["Which protocol is insecure because it sends data in plaintext?","SSH","HTTPS","Telnet","IPSec"],
["Which firewall type tracks active sessions?","Stateless Firewall","Packet Filtering Firewall","Stateful Firewall","Proxy Server"],
["Which network zone is used for public-facing servers?","LAN","WAN","DMZ","VLAN"],
["Which ASA interface normally has security level 100?","Outside","DMZ","Inside","Internet"],
["What does IPS mainly inspect?","Only IP addresses","Packet Payload","Routing Tables","MAC Tables"],
["Which IPS deployment mode actively blocks attacks?","Promiscuous","Passive","Inline","Monitor"],
["Which detection method relies on known attack patterns?","Anomaly-Based","Policy-Based","Signature-Based","Behavioral"],
["What is the primary purpose of VPN?","Increase bandwidth","Encrypt communication","Manage VLANs","Configure ACLs"],
["Which IPSec protocol provides encryption?","AH","ESP","FTP","ICMP"],
["Which IPSec mode encrypts the entire packet?","Transport Mode","Hybrid Mode","Tunnel Mode","Static Mode"],
["Which VPN type connects two remote networks?","SSL VPN","Remote Access VPN","Site-to-Site VPN","PPTP"],
["Which VPN type allows individual users to connect securely?","Site-to-Site","Remote Access","MPLS","NAT"],
["Which AAA component verifies identity?","Accounting","Authorization","Authentication","Auditing"],
["Which protocol is preferred for administrator authentication?","FTP","RADIUS","TACACS+","Telnet"],
["Which attack floods the MAC address table of a switch?","VLAN Hopping","DHCP Spoofing","MAC Flooding","ARP Poisoning"],
["Which feature protects against ARP spoofing?","NAT","DAI","VPN","ACL"],
["What is the purpose of DHCP Snooping?","Encrypt traffic","Prevent rogue DHCP attacks","Configure VPN","Block routing"],
["Which concept divides the network into smaller secure zones?","NAT","Segmentation","Encryption","Switching"],
["Which principle means “Trust nothing by default”?","Least Privilege","Defense in Depth","Zero Trust","Availability"],
["Which design element isolates public services from internal systems?","VLAN","DMZ","NAT","ACL"],
["Which logging system centralizes security events?","NAT","SIEM","VPN","DHCP"],
["Which protocol is used for centralized logging?","FTP","Syslog","SSH","HTTPS"],
["Which protocol is used for monitoring network devices?","SNMP","SMTP","NAT","ARP"],
["Which tool analyzes network traffic flows?","ACL","NetFlow","VPN","VLAN"],
["Which command enables AAA on Cisco devices?","aaa enable","aaa start","aaa new-model","enable aaa"],
["Which Cisco platform supports NGFW and IPS?","Hub","Modem","Firepower","Repeater"],
["Which action completely terminates a malicious connection in IPS?","Alert","Drop","Reset","Monitor"],
["Which concept limits user permissions to only necessary access?","Segmentation","Least Privilege","Encryption","Availability"],
["Which security mechanism verifies data authenticity?","NAT","Digital Signature","Routing","VLAN"],
["Which attack mainly targets users psychologically?","DDoS","Social Engineering","SQL Injection","IPSec"],
["Which security layer is responsible for switch protection?","Layer 7","Layer 2 Security","IPSec","VPN"],
["Which technology translates private IP addresses into public addresses?","VPN","NAT","ACL","IPS"],
["Which protocol secures remote command-line access?","HTTP","Telnet","SSH","FTP"],
["Which IPS detection type identifies unusual behavior?","Signature-Based","Policy-Based","Anomaly-Based","Static"],
["Which firewall technology performs application awareness?","Packet Filtering","NGFW","Stateless","ACL"],
["Which concept uses multiple layers of security controls?","NAT","Defense in Depth","VLAN","Availability"]
];

const answers = [
"Protecting systems and data from threats",
"Confidentiality",
"MITM",
"Hardening",
"Telnet",
"Stateful Firewall",
"DMZ",
"Inside",
"Packet Payload",
"Inline",
"Signature-Based",
"Encrypt communication",
"ESP",
"Tunnel Mode",
"Site-to-Site VPN",
"Remote Access",
"Authentication",
"TACACS+",
"MAC Flooding",
"DAI",
"Prevent rogue DHCP attacks",
"Segmentation",
"Zero Trust",
"DMZ",
"SIEM",
"Syslog",
"SNMP",
"NetFlow",
"aaa new-model",
"Firepower",
"Reset",
"Least Privilege",
"Digital Signature",
"Social Engineering",
"Layer 2 Security",
"NAT",
"SSH",
"Anomaly-Based",
"NGFW",
"Defense in Depth"
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;

["A","B","C","D"].forEach((l,j)=>{
html+=`
<label>
  <input type="radio" name="q${i+1}" value="${q[j+1]}">
  <span>${l}) ${q[j+1]}</span>
</label>
`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label => {
  let input = label.querySelector("input");

  if(input.value === correct){
    label.innerHTML += " ✅";
    label.style.color = "#22c55e";
  }
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music = document.getElementById("bgMusic");
let volume = document.getElementById("volume");

music.volume = volume.value; 
document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
