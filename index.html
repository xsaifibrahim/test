<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Programming Quiz</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
<div class="footer">
  Powered by xsaif
</div>

<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

.footer {
    position: absolute;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #0ff;

    text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #00f;

    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow:
            0 0 5px #0ff,
            0 0 10px #0ff,
            0 0 20px #0ff;
    }
    to {
        text-shadow:
            0 0 10px #0ff,
            0 0 20px #0ff,
            0 0 40px #00f;
    }
}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}

.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://d.top4top.io/m_374541f2m1.mp3">
</audio>

<div class="container">
<h1>Network Programming</h1>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="tf.html"><button>Go to True/False</button></a>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
  "What does DNS stand for?",
  "Which of the following is NOT an application-layer protocol?",
  "HTTP operates over which transport layer protocol by default?",
  "What does SMTP stand for?",
  "Web caching improves:",
  "Which protocol is used to transfer files over the web?",
  "A socket is:",
  "What is the default port number for HTTP?",
  "Which of the following is a transport-layer protocol?",
  "Which transport protocol provides unreliable data transfer?",
  "Which transport-layer service ensures data is received in order?",
  "What is the main advantage of UDP over TCP?",
  "Which of the following is a reliable transport-layer protocol?",
  "Which transport-layer protocol provides connection-oriented service?",
  "Which of the following uses a stop-and-wait protocol?",
  "Which of the following services uses UDP instead of TCP?",
  "Which device operates at the Data Link layer of the OSI model?",
  "Which protocol is used to transfer web pages from a server to a client?",
  "Which of the following is an application-layer protocol?",
  "Which transport-layer protocol is primarily used by HTTP?",
  "Which application layer protocol is responsible for sending emails?",
  "Which type of HTTP connection remains open for multiple requests and responses?",
  "Which port number does HTTP use by default?",
  "What is the default port number for SMTP?",
  "Which of the following is NOT an application-layer protocol?"
];

const answers = [
  ["Data Name System", "Domain Name System", "Digital Network Service", "Domain Network System"],
  ["HTTP", "FTP", "SMTP", "IP"],
  ["UDP", "TCP", "ICMP", "IP"],
  ["Secure Mail Transfer Protocol", "Simple Mail Transfer Protocol", "Standard Mail Transmission Procedure", "Safe Mail Transport Protocol"],
  ["Security", "Availability", "Latency", "Throughput only"],
  ["HTTP", "FTP", "SMTP", "DNS"],
  ["An IP address", "A TCP segment", "An interface between the app and transport layer", "A type of encryption"],
  ["25", "80", "110", "53"],
  ["IP", "TCP", "DNS", "HTTP"],
  ["TCP", "UDP", "FTP", "SMTP"],
  ["UDP", "TCP", "IP", "DNS"],
  ["Error correction", "High reliability", "Low overhead and latency", "Encryption"],
  ["TCP", "UDP", "ICMP", "DNS"],
  ["UDP", "TCP", "IP", "DNS"],
  ["TCP", "HTTP", "RDT 1.0", "Go-Back-N"],
  ["HTTP", "FTP", "DNS", "Email"],
  ["Router", "Switch", "Hub", "Firewall"],
  ["FTP", "SMTP", "HTTP", "SSH"],
  ["TCP", "IP", "HTTP", "Ethernet"],
  ["TCP", "UDP", "ICMP", "IP"],
  ["IMAP", "POP3", "SMTP", "HTTP"],
  ["Non-persistent HTTP", "Persistent HTTP", "UDP-based HTTP", "Stateless HTTP"],
  ["21", "53", "80", "443"],
  ["25", "80", "110", "443"],
  ["FTP", "TCP", "HTTP", "DNS"]
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;
["A","B","C","D"].forEach((l,j)=>{
html+=`<label><input type="radio" name="q${i+1}" value="${q[j+1]}"> ${l}) ${q[j+1]}</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label=>{
if(label.textContent.includes(correct)){
label.innerHTML += " ✅";
label.style.color="#22c55e";
}
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music=document.getElementById("bgMusic");
let volume=document.getElementById("volume");

document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
