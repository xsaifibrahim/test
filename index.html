<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Programming Quiz</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
<div class="footer">
  Powered by xsaif
</div>

<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #0ff;

    text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #00f;

    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from {
        text-shadow:
            0 0 5px #0ff,
            0 0 10px #0ff,
            0 0 20px #0ff;
    }
    to {
        text-shadow:
            0 0 10px #0ff,
            0 0 20px #0ff,
            0 0 40px #00f;
    }
}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}

.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://d.top4top.io/m_374541f2m1.mp3">
</audio>

<div class="container">
<h1>🔥 Disturbed Systems Quiz</h1>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="tf.html"><button>Go to True/False</button></a>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
["What is the basis for communication in a Network Operating System?","Shared memory","Messages","Files","Remote procedure calls"],
["In the comparison of systems, which type has the highest degree of transparency?","Network OS","Middleware-based OS","Distributed OS","Hybrid OS"],
["Which type of computing system consists of homogeneous computing nodes connected by high-speed LAN?","Grid computing","Cloud computing","Cluster computing","Pervasive computing"],
["In multi-computer systems, how does data travel between processors?","Through internal bus only","Via LAN cable","Through shared memory","Through wireless connections"],
["What characterizes the omega switching network in multiprocessors?","Single stage design","Multiple stages required","Direct connections only","No switching capability"],

// NEW QUESTIONS
["Which of the following is a cloud system mentioned in the document?","Amazon EC2","Local Server","Private Cloud","Virtual Machine"],
["What is the maximum speed limit for single processor performance mentioned in the document?","3GHz","4GHz","5GHz","6GHz"],
["Cloud systems mentioned in the document include Amazon EC2 and Google AWS.","True","False","",""],
["What is the primary role of the communication subsystem in a distributed system?","Manage hardware resources","Facilitate communication between hosts","Execute application logic","Perform data encryption"],
["Which of the following is NOT a communication requirement of a distributed system?","Performance (latency, bandwidth)","Scalability","Mobility","Single-threaded execution"],
["A node in a network refers to:","Only routers","Any device that can send/receive data","Only servers","End-user applications"],

["Which network type covers the smallest geographical area?","WAN","PAN","MAN","GAN"],
["Which wireless network type is used for city-wide coverage?","WPAN","WLAN","WMAN","WWAN"],
["What does SAN stand for in networking?","System Area Network","Storage Area Network","Secure Access Network","Server Allocation Network"],
["Which component connects different networks of the same type?","Router","Bridge","Hub","Modem"],
["Tunnelling is used to:","Encrypt all network traffic","Enable communication using encapsulation","Increase bandwidth","Replace routers"],

["In symmetric multiprocessing (SMP), the OS can:","Assign fixed roles to CPUs","Use all CPUs dynamically","Only run user-mode tasks","Work without shared memory"],
["A shared memory multiprocessor allows:","Each CPU to have private memory","Uniform memory access (UMA)","Non-uniform latency (NUMA)","Decentralized resource management"],
["NUMA systems have:","Same memory speed","Faster access to local memory","No memory sharing","Single memory controller"],
["Distributed shared memory (DSM) may suffer from:","False sharing of pages","Unlimited scalability","No replication issues","Centralized page management"]
];

const answers = [
"Messages",
"Distributed OS",
"Cluster computing",
"Via LAN cable",
"Multiple stages required",

// NEW ANSWERS
"Amazon EC2",
"5GHz",
"True",
"Facilitate communication between hosts",
"Single-threaded execution",
"Any device that can send/receive data",

"PAN",
"WMAN",
"Storage Area Network",
"Bridge",
"Enable communication using encapsulation",

"Use all CPUs dynamically",
"Uniform memory access (UMA)",
"Faster access to local memory",
"False sharing of pages"
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;
["A","B","C","D"].forEach((l,j)=>{
html+=`<label><input type="radio" name="q${i+1}" value="${q[j+1]}"> ${l}) ${q[j+1]}</label><br>`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label=>{
if(label.textContent.includes(correct)){
label.innerHTML += " ✅";
label.style.color="#22c55e";
}
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music=document.getElementById("bgMusic");
let volume=document.getElementById("volume");

document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
