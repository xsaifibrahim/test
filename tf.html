<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CCNA True/False - By : xsaif</title>

<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}
video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}
.container {max-width:900px;margin:auto;padding:20px;}
.question {background:rgba(0,0,0,0.5);padding:15px;margin-bottom:12px;border-radius:10px;}
.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}
button {padding:12px;width:100%;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:18px;margin-top:10px;}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}
#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;}
.popup-content {background:#1e293b;padding:30px;border-radius:15px;text-align:center;}
</style>
</head>

<body>

<video class="bg" autoplay muted loop>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://d.top4top.io/m_374541f2m1.mp3">
</audio>

<div class="container">
<h1>True / False Quiz</h1>

<a href="index.html">
<button type="button">⬅ Back to MCQ</button>
</a>

<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
"Confidentiality ensures that data is accessible when needed.",
"Integrity ensures that data has not been altered.",
"Availability ensures systems are accessible when needed.",
"Firewalls can deeply inspect application-layer data by default.",
"IPS can block malicious traffic in real time.",

"Signature-based detection can detect zero-day attacks.",
"Anomaly-based detection compares current behavior with normal patterns.",
"Policy-based detection focuses on enforcing security rules.",
"Inline IPS deployment allows traffic monitoring without blocking.",
"Promiscuous mode IPS can prevent attacks.",

"Hardening reduces the attack surface of a system.",
"Telnet is a secure protocol for remote access.",
"SSH provides encrypted remote access.",
"NAT is used for encrypting network traffic.",
"DMZ is used to isolate public-facing services.",

"ACLs are used to define traffic filtering rules.",
"Cisco ASA security level 100 is typically assigned to the outside interface.",
"IPS analyzes packet content, not just headers.",
"Packet capture tools can help detect network attacks.",
"DDoS attacks aim to steal data from users.",

"Phishing attacks rely on social engineering techniques.",
"Switches operate at Layer 3 of the OSI model by default.",
"Routers are responsible for directing traffic between networks.",
"FirePOWER is a Cisco solution that integrates IPS capabilities.",
"Logging is part of the control plane in network devices.",

"SIEM systems collect and analyze security logs.",
"MITM attacks can modify data during transmission.",
"Encryption ensures data integrity only.",
"An IPS system can reset a connection if malicious activity is detected.",
"Network security depends only on hardware devices."
];

const answers = [
false,true,true,false,true,false,true,true,false,false,
true,false,true,false,true,true,false,true,true,false,
true,false,true,true,false,true,true,false,true,false
];

window.onload = ()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+i;

div.innerHTML=`
<p>${i+1}. ${q}</p>
<label><input type="radio" name="q${i}" value="true"> True</label><br>
<label><input type="radio" name="q${i}" value="false"> False</label>
`;

form.appendChild(div);
});
};

function submitQuiz(){
let score=0;

questions.forEach((_,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);

if(selected && (selected.value==="true")===answers[i]){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
});

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML="🔥 Score: "+score+"/30";
}

function restartQuiz(){
location.reload();
}

let music=document.getElementById("bgMusic");
let volume=document.getElementById("volume");

music.volume=0.5;

document.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

document.querySelector(".music-btn").onclick=()=>{
if(music.paused){music.play();}else{music.pause();}
};

volume.oninput=()=>{music.volume=volume.value};

</script>

</body>
</html>
