<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disturbed Systems True/False - By : xsaif</title>

<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}
video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}
.container {max-width:900px;margin:auto;padding:20px;}
.question {background:rgba(0,0,0,0.5);padding:15px;margin-bottom:12px;border-radius:10px;}
.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}
button {padding:12px;width:100%;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:18px;margin-top:10px;}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}
#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;}
.popup-content {background:#1e293b;padding:30px;border-radius:15px;text-align:center;}
</style>
</head>

<body>

<video class="bg" autoplay muted loop>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://d.top4top.io/m_374541f2m1.mp3">
</audio>

<div class="container">
<h1>True / False Quiz</h1>

<a href="index.html">
<button type="button">⬅ Back to MCQ</button>
</a>

<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
"Multi Computer: Cluster, Data need to travel outside PC via LAN cable.",
"Multi-processor: Tightly coupled, Data no need to travel outside PC, outside board.",
"Heterogeneous Multicomputer Systems, the nodes that form the system may vary widely.",
"Heterogeneous Multicomputer Systems, the interconnection network may be heterogeneous.",
"Heterogeneous Multicomputer Systems, large scale multicomputer using existing networks and backbones.",
"Uniprocessor operating system, implement a virtual machine.",
"NOS, loosely-coupled operating system for heterogeneous multi-computers (LAN and WAN).",
"Symmetric Multiprocessor is a one OS can use all the CPUs (allowing several tasks to be performed simultaneously).",
"Asymmetric Multiprocessor, processors play different roles (mostly master-slave).",
"In distributed memory multiprocessor, each processor has its own memory.",

"In Uniform Memory Access system, Access to all memory at the same speed for all processors.",
"NOS does not provide true distribution transparency, but does provide convenience.",
"Can provide better services with shared servers.",
"Middleware models describe the way of distribution and communication."
];

const answers = [
true,
true,
true,
true,
true,
false,
true,
true,
true,
true,

true,
true,
true,
true
];

window.onload = ()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+i;

div.innerHTML=`
<p>${i+1}. ${q}</p>
<label><input type="radio" name="q${i}" value="true"> True</label><br>
<label><input type="radio" name="q${i}" value="false"> False</label>
`;

form.appendChild(div);
});
};

function submitQuiz(){
let score=0;

questions.forEach((_,i)=>{
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);

if(selected && (selected.value==="true")===answers[i]){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
});

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML="🔥 Score: "+score+"/30";
}

function restartQuiz(){
location.reload();
}

let music=document.getElementById("bgMusic");
let volume=document.getElementById("volume");

music.volume=0.5;

document.addEventListener("click",()=>{
music.play().catch(()=>{});
},{once:true});

document.querySelector(".music-btn").onclick=()=>{
if(music.paused){music.play();}else{music.pause();}
};

volume.oninput=()=>{music.volume=volume.value};

</script>

</body>
</html>
