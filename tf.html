<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project X</title>


<style>
body {margin:0;font-family:Arial;color:white;overflow-x:hidden;}

video.bg {position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-1;}
.overlay {position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:-1;}

.container {max-width:900px;width:95%;margin:auto;padding:20px;}

.question {background:rgba(0,0,0,0.5);padding:12px;margin-bottom:12px;border-radius:10px;}

.correct {background:#16a34a !important;}
.wrong {background:#dc2626 !important;}

button {
  padding:14px;
  width:100%;
  background:linear-gradient(135deg,#3b82f6,#9333ea);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}
button:hover {transform:scale(1.03);}

.music-container {position:fixed;top:15px;right:15px;display:flex;align-items:center;}
.music-btn {background:#111;padding:10px;border-radius:50%;cursor:pointer;}

#volume {width:0;opacity:0;margin-left:10px;transition:0.3s;}
.music-container:hover #volume {width:100px;opacity:1;}

.popup {
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}
.footer {text-align:center;padding:10px;font-size:16px;color:#0ff;text-shadow:0 0 5px #0ff,0 0 10px #0ff;}

.popup-content {
  position:relative;
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.close-btn {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}

h1 {
  text-align: center;
  margin-top: 10px;
}

@media(max-width:600px){
h1{text-align:center;font-size:20px;}
}

label {
  display:block;
  background: rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
  margin:6px 0;
  cursor:pointer;
  transition:0.3s;
}

label:hover {
  background: rgba(0,255,255,0.1);
}

input[type="radio"] {
  display:none;
}

label span::before {
  content:"";
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid #aaa;
  border-radius:50%;
  margin-right:10px;
  vertical-align:middle;
  transition:0.3s;
}

input[type="radio"]:checked + span {
  color:#0ff;
  font-weight:bold;
}

input[type="radio"]:checked + span::before {
  background:#0ff;
  border-color:#0ff;
  box-shadow:0 0 10px #0ff, 0 0 20px #0ff;
}

input[type="radio"]:checked + span {
  text-shadow:0 0 5px #0ff;
}
</style>
</head>

<body>

<video class="bg" autoplay muted loop playsinline>
  <source src="https://c.top4top.io/m_3745v8l4o1.mp4">
</video>
<div class="overlay"></div>

<div class="music-container">
  <div class="music-btn">🔊</div>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="">
</audio>
<!-- https://j.top4top.io/m_3748lc2rv1.mp3 -->


<div class="container">
<h1>CCNA SECUIRTY</h1>
<h2>True Or False</h2>
<form id="quiz"></form>

<button onclick="submitQuiz()">Submit</button>
<button onclick="restartQuiz()">Restart 🔄</button>
<a href="index.html">
<button type="button">⬅ MCQs on CCNA</button>
</a>
<div class="footer">⚡ Powered by xsaif</div>

</div>

<!-- popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">❌</span>
    <h2 id="finalScore"></h2>
    <button onclick="restartQuiz()">Retry 🔄</button>
  </div>
</div>

<script>

const questions = [
["Confidentiality protects data from unauthorized access.","True","False","-","-"],
["Integrity ensures systems remain operational.","True","False","-","-"],
["MITM attacks can alter transmitted data.","True","False","-","-"],
["Hardening reduces device vulnerabilities.","True","False","-","-"],
["SSH is more secure than Telnet.","True","False","-","-"],
["Stateful firewalls track connection sessions.","True","False","-","-"],
["DMZ is used to isolate public services.","True","False","-","-"],
["IPS only monitors traffic and cannot block attacks.","True","False","-","-"],
["Inline IPS deployment can prevent attacks in real time.","True","False","-","-"],
["Signature-based detection can identify unknown attacks.","True","False","-","-"],
["ESP provides encryption in IPSec.","True","False","-","-"],
["Tunnel Mode encrypts the entire packet.","True","False","-","-"],
["Site-to-Site VPN connects users individually.","True","False","-","-"],
["Remote Access VPN is designed for remote users.","True","False","-","-"],
["AAA stands for Authentication, Authorization, and Accounting.","True","False","-","-"],
["RADIUS is commonly used for user authentication.","True","False","-","-"],
["TACACS+ encrypts the entire packet.","True","False","-","-"],
["MAC Flooding targets router routing tables.","True","False","-","-"],
["DAI protects against ARP spoofing attacks.","True","False","-","-"],
["DHCP Snooping prevents rogue DHCP servers.","True","False","-","-"],
["Zero Trust means trusting all internal users.","True","False","-","-"],
["Segmentation helps reduce attack spread.","True","False","-","-"],
["SIEM systems collect and analyze logs.","True","False","-","-"],
["Syslog is used for centralized event logging.","True","False","-","-"],
["SNMP is used for device monitoring.","True","False","-","-"],
["NetFlow analyzes network traffic patterns.","True","False","-","-"],
["ACLs are used to filter traffic.","True","False","-","-"],
["Cisco Firepower supports IPS functionality.","True","False","-","-"],
["Least Privilege gives users full permissions.","True","False","-","-"],
["Digital signatures help verify authenticity.","True","False","-","-"],
["NGFW supports application-level inspection.","True","False","-","-"],
["Social Engineering targets human behavior.","True","False","-","-"],
["NAT provides data encryption.","True","False","-","-"],
["Promiscuous IPS deployment blocks attacks automatically.","True","False","-","-"],
["Availability ensures systems remain accessible.","True","False","-","-"],
["AAA can be integrated with VPN authentication.","True","False","-","-"],
["Inside ASA interface usually has higher trust than Outside interface.","True","False","-","-"],
["Packet Filtering Firewall performs deep packet inspection.","True","False","-","-"],
["Layer 2 attacks mainly target switches.","True","False","-","-"],
["Defense in Depth uses multiple security layers.","True","False","-","-"]
];

const answers = [
"True",
"False",
"True",
"True",
"True",
"True",
"True",
"False",
"True",
"False",
"True",
"True",
"False",
"True",
"True",
"True",
"True",
"False",
"True",
"True",
"False",
"True",
"True",
"True",
"True",
"True",
"True",
"True",
"False",
"True",
"True",
"True",
"False",
"False",
"True",
"True",
"True",
"False",
"True",
"True"
];

// build questions
window.onload=()=>{
let form=document.getElementById("quiz");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.id="q"+(i+1);

let html=`<p>${i+1}. ${q[0]}</p>`;

["A","B","C","D"].forEach((l,j)=>{
html+=`
<label>
  <input type="radio" name="q${i+1}" value="${q[j+1]}">
  <span>${l}) ${q[j+1]}</span>
</label>
`;
});

div.innerHTML=html;
form.appendChild(div);
});
};

// submit
function submitQuiz(){
let score=0;

for(let i=1;i<=questions.length;i++){
let selected=document.querySelector(`input[name="q${i}"]:checked`);
let div=document.getElementById("q"+i);
let correct=answers[i-1];

let labels=div.querySelectorAll("label");

labels.forEach(label => {
  let input = label.querySelector("input");

  if(input.value === correct){
    label.innerHTML += " ✅";
    label.style.color = "#22c55e";
  }
});

if(selected && selected.value===correct){
score++;
div.classList.add("correct");
}else{
div.classList.add("wrong");
}
}

document.getElementById("popup").style.display="flex";
document.getElementById("finalScore").innerHTML=
`🔥 Score: ${score} / ${questions.length}`;
}

// restart
function restartQuiz(){
location.reload();
}

// close popup
function closePopup(){
document.getElementById("popup").style.display="none";
}

let music = document.getElementById("bgMusic");
let volume = document.getElementById("volume");

music.volume = volume.value; 
document.addEventListener("click",()=>{music.play().catch(()=>{});},{once:true});
document.querySelector(".music-btn").onclick=()=>{music.paused?music.play():music.pause()};
volume.oninput=()=>{music.volume=volume.value};
</script>

</body>
</html>
